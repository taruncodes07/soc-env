name: soc-env
version: 1.1.0
description: >
  A Security Operations Center environment where an AI agent monitors
  organization-wide device telemetry, detects anomalies, and executes
  remediation actions.
tasks:
  - id: task_1
    name: Single Device Anomaly
    difficulty: easy
  - id: task_2
    name: Multi-Device Triage
    difficulty: medium
  - id: task_3
    name: Correlated Multi-Stage Attack
    difficulty: hard
  - id: task_4
    name: Lateral Movement & Honey-pot Triage
    difficulty: hard
action_space:
  type: structured_json
  schema_ref: server/models.py:Action
observation_space:
  type: structured_json
  schema_ref: server/models.py:Observation
reward_range: [0.01, 0.99]
